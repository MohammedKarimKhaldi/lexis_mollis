name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests, schemas and governance
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[derive]'

      - name: Run unit tests
        run: python -m unittest discover -v

      - name: Validate metadata schemas and ontology
        run: python scripts/validate_schemas.py

      - name: Check governance files
        run: python scripts/check_governance.py

      - name: Validate citation metadata
        run: |
          python -m venv /tmp/cffconvert
          /tmp/cffconvert/bin/python -m pip install --upgrade pip
          /tmp/cffconvert/bin/python -m pip install 'cffconvert==2.0.0'
          /tmp/cffconvert/bin/cffconvert --validate
